name: beslet_app
description: Beslet (ብስለት) - Spiritual Growth & Life Discipline System
publish_to: 'none'
version: 1.4.7+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  wakelock_plus: ^1.2.10
  home_widget: ^0.7.0
  timezone: ^0.10.1
  file_picker: ^8.1.7
  http: ^1.2.0
  flutter_tts: ^4.2.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0
  share_plus: ^12.0.2

hooks:
  user_defines:
    sqlite3:
      source: system

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/data/
  fonts:
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Regular.ttf
        - asset: assets/fonts/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantGaramond-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Untitled design.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/Untitled design.png"
  min_sdk_android: 21
  remove_alpha_ios: true
